default_install_hook_types: [pre-commit, pre-push]

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: [--maxkb=1024]
      - id: check-merge-conflict

  # ── Backend: fast linting on commit ────────────────────────────────────
  # Keep this rev in sync with `ruff==X.Y.Z` in .github/workflows/ci.yml
  # AND `ruff==X.Y.Z` in backend/pyproject.toml [dependency-groups].dev.
  # See CLAUDE.md "Known gotchas" — drift forces SKIP=ruff-format bypasses.
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.11
    hooks:
      - id: ruff
        args: [--fix]
        files: ^backend/
      - id: ruff-format
        files: ^backend/

  # ── Backend: mypy on commit (uses the active venv) ─────────────────────
  - repo: local
    hooks:
      - id: mypy
        name: mypy (backend)
        entry: bash -c 'cd backend && ./.venv/bin/mypy app'
        language: system
        files: ^backend/
        types_or: [python, pyi]
        pass_filenames: false

  # ── Frontend: type-check on commit (vue-tsc) ───────────────────────────
      - id: vue-tsc
        name: vue-tsc --noEmit (frontend)
        entry: bash -c 'cd frontend && npm run type-check'
        language: system
        files: ^frontend/.*\.(vue|ts|tsx|js)$
        pass_filenames: false

  # ── Pre-push: tests ────────────────────────────────────────────────────
      - id: pytest
        name: pytest (backend)
        entry: bash -c 'cd backend && ./.venv/bin/pytest -q'
        language: system
        stages: [pre-push]
        pass_filenames: false
        types: [python]
        always_run: true

      - id: vitest
        name: vitest run (frontend)
        entry: bash -c 'cd frontend && npm run test --silent'
        language: system
        stages: [pre-push]
        pass_filenames: false
        always_run: true

      # ── Pre-push: refuse direct code pushes to main ──────────────────────
      # Pure docs-only diffs (docs/, thoughts/, tasks/, *.md at repo root)
      # are allowed through; anything else must go through a PR. See
      # scripts/pre-push-main-guard.sh for the full policy rationale and the
      # `--no-verify` caveat (git skips client hooks entirely on --no-verify;
      # branch-protection rulesets are the only server-side fix).
      - id: main-branch-docs-only-guard
        name: main-branch-docs-only-guard
        entry: bash scripts/pre-push-main-guard.sh
        language: system
        stages: [pre-push]
        pass_filenames: false
        always_run: true
