name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: scrumban
          POSTGRES_PASSWORD: scrumban
          POSTGRES_DB: scrumban
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U scrumban"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      DATABASE__URL: postgresql+asyncpg://scrumban:scrumban@localhost:5432/scrumban

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install ruff mypy pytest pytest-asyncio httpx types-python-jose

      - name: Ruff (lint)
        run: ruff check .

      - name: Ruff (format --check)
        run: ruff format --check .

      - name: Mypy
        run: mypy app

      - name: Alembic migrations (upgrade head)
        run: alembic upgrade head

      - name: Alembic round-trip (downgrade + upgrade)
        run: |
          alembic downgrade base
          alembic upgrade head

      - name: Pytest
        run: pytest -q

  frontend:
    name: frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run type-check

      - name: Vitest
        run: npm test

      - name: Build
        run: npm run build
